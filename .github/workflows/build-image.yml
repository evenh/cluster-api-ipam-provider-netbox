name: Build and Push Docker Image

on:
  workflow_call:
    inputs:
      image_tags:
        description: 'Newline-separated list of image tags to push'
        required: true
        type: string
      labels:
        description: 'Optional newline-separated list of OCI labels'
        required: false
        type: string
      version:
        description: 'Version string embedded into the manager binary'
        required: false
        default: 'dev'
        type: string

jobs:
  build-image:
    name: Build and push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ inputs.image_tags }}
          labels: ${{ inputs.labels }}
          build-args: |
            VERSION=${{ inputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
