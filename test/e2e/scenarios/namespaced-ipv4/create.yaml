apiVersion: v1
kind: Namespace
metadata:
  name: ($values.namespace)
---
apiVersion: v1
kind: Secret
metadata:
  name: netbox-credentials
  namespace: ($values.namespace)
stringData:
  url: ($values.netboxURL)
  token: ($values.netboxToken)
---
apiVersion: ipam.cluster.x-k8s.io/v1alpha1
kind: NetBoxIPPool
metadata:
  name: netbox-pool
  namespace: ($values.namespace)
spec:
  clusterName: namespaced-move-cluster
  connectionSecretRef:
    name: netbox-credentials
  prefixes:
  - id: ($values.prefixID)
  metadataDefaults:
    dnsName: pool.example.com
    tags:
    - pool-default
    customFields:
      source: chainsaw
---
apiVersion: ipam.cluster.x-k8s.io/v1beta2
kind: IPAddressClaim
metadata:
  name: claim
  namespace: ($values.namespace)
  annotations:
    ipam.netbox.cluster.x-k8s.io/dns-name: claimed.example.com
    ipam.netbox.cluster.x-k8s.io/tags: claim-override
    ipam.netbox.cluster.x-k8s.io/custom-fields: '{"owner":"namespaced"}'
spec:
  poolRef:
    apiGroup: ipam.cluster.x-k8s.io
    kind: NetBoxIPPool
    name: netbox-pool
