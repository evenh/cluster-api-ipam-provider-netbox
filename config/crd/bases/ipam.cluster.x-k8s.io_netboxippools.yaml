---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: netboxippools.ipam.cluster.x-k8s.io
spec:
  group: ipam.cluster.x-k8s.io
  names:
    kind: NetBoxIPPool
    listKind: NetBoxIPPoolList
    plural: netboxippools
    singular: netboxippool
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.addresses.allocated
      name: Allocated
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: NetBoxIPPool is the Schema for the netboxippools API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: NetBoxIPPoolSpec defines the desired state shared by both
              pool types.
            properties:
              claimUIDCustomField:
                description: ClaimUIDCustomField is the NetBox custom field used to
                  store the Kubernetes IPAddressClaim UID.
                type: string
              clusterName:
                description: |-
                  ClusterName associates the pool with a Cluster API Cluster for clusterctl move. When set, the
                  controller mirrors it to the standard cluster.x-k8s.io/cluster-name label on the pool.
                type: string
              connectionSecretRef:
                description: ConnectionSecretRef points at the Secret that contains
                  the NetBox URL, token, and optional TLS settings.
                properties:
                  name:
                    description: Name is the Secret name.
                    minLength: 1
                    type: string
                  namespace:
                    description: |-
                      Namespace is the Secret namespace. For namespaced pools this should normally be omitted so the
                      pool namespace is used. Global pools should set it explicitly because they are cluster-scoped.
                    type: string
                required:
                - name
                type: object
              ipAddressStatus:
                description: IPAddressStatus is the NetBox status assigned to newly
                  allocated IP addresses.
                type: string
              metadataDefaults:
                description: MetadataDefaults defines the default NetBox fields applied
                  to each allocation before claim-level overrides.
                properties:
                  customFields:
                    additionalProperties:
                      type: string
                    description: CustomFields maps NetBox custom field names to string
                      values.
                    type: object
                  dnsName:
                    description: DNSName sets the DNS name stored on the allocated
                      IP address.
                    type: string
                  tags:
                    description: Tags are NetBox tags to attach to allocated IP addresses.
                      Claim annotations can override this list.
                    items:
                      type: string
                    type: array
                    x-kubernetes-list-type: set
                  tenantID:
                    description: TenantID sets the NetBox tenant on allocated IP addresses.
                    format: int32
                    minimum: 1
                    type: integer
                  vrfID:
                    description: VRFID sets the NetBox VRF on allocated IP addresses.
                    format: int32
                    minimum: 1
                    type: integer
                type: object
              ownershipTag:
                description: OwnershipTag is added to every allocated NetBox IP address
                  so the provider can find and clean it up later.
                type: string
              prefixes:
                description: |-
                  Prefixes lists the candidate NetBox prefixes to allocate from. Prefixes are tried in order until
                  an address is allocated or all options are exhausted.
                items:
                  description: NetBoxPrefixReference identifies a NetBox prefix by
                    ID or CIDR.
                  properties:
                    cidr:
                      description: CIDR is the prefix in CIDR notation. The provider
                        resolves it to a unique NetBox prefix before allocation.
                      minLength: 1
                      type: string
                    id:
                      description: ID is the NetBox prefix primary key. Use this when
                        the backing prefix object is already known.
                      format: int32
                      minimum: 1
                      type: integer
                    vrfID:
                      description: VRFID narrows CIDR resolution to a specific NetBox
                        VRF. It only applies when CIDR is used.
                      format: int32
                      minimum: 1
                      type: integer
                  type: object
                  x-kubernetes-validations:
                  - message: exactly one of id or cidr must be set
                    rule: has(self.id) != has(self.cidr)
                  - message: vrfID can only be set when cidr is used
                    rule: '!has(self.vrfID) || has(self.cidr)'
                minItems: 1
                type: array
            required:
            - connectionSecretRef
            - prefixes
            type: object
          status:
            description: NetBoxIPPoolStatus defines the observed state shared by both
              pool types.
            properties:
              addresses:
                description: Addresses summarises the current number of Kubernetes-side
                  allocations using this pool.
                properties:
                  allocated:
                    description: Allocated is the number of Kubernetes IPAddress objects
                      currently referencing the pool.
                    format: int32
                    type: integer
                required:
                - allocated
                type: object
              conditions:
                description: Conditions reports the current reconciliation state of
                  the pool.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration is the most recent metadata.generation
                  processed by the controller.
                format: int64
                type: integer
              resolvedPrefixes:
                description: ResolvedPrefixes reports the concrete NetBox prefix IDs
                  that the controller resolved for this pool.
                items:
                  format: int32
                  type: integer
                type: array
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
