# Connection Secret referenced by NetBoxIPPool/GlobalNetBoxIPPool via spec.connectionSecretRef.
#
# Required keys:
#   url   - NetBox base URL, e.g. https://netbox.example.com
#   token - NetBox API token with permission to manage IPAM prefixes, IP addresses, tags, and to
#           read the custom field referenced by spec.claimUIDCustomField
#
# Optional keys:
#   insecureSkipVerify - "true" to skip TLS certificate verification (not recommended)
#   caBundle            - PEM-encoded CA certificate bundle to trust, for private/self-signed NetBox
apiVersion: v1
kind: Secret
metadata:
  name: netbox-credentials
  namespace: default
  labels:
    app.kubernetes.io/name: cluster-api-ipam-provider-netbox
    app.kubernetes.io/managed-by: kustomize
stringData:
  url: https://netbox.example.com
  token: REPLACE_ME
